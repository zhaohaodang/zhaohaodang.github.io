    <style>
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .btn {
            padding: 0 1.5rem;
        }
        
        .banner {
            margin-top: 100px;
        }
        .qrcode-box{
            position: relative;
        }
        .qrcode{
            visibility: hidden;
            position: absolute;
            top: 42px;
            transition: 0.3s;
            opacity: 0.0;
            width: 100px;
            height: 100px;
            left: 50%;
            margin-left: -50px;
            box-shadow: 0px 0px 4px rgba(6, 153, 239, 0.5);
        }
        .qrcode-box:hover .qrcode,.qrcode-box:active .qrcode{
            visibility:visible;
            opacity:1.0 ;
        }
        @media only screen and (min-width: 1200px) {
            .header {
                width: 60%;
                display: block;
                margin: 0 auto;
            }
        }
    </style>

    <canvas></canvas>
    <script>
        document.addEventListener('touchmove', function(e) {
            e.preventDefault()
        })
        var c = document.getElementsByTagName('canvas')[0],
            x = c.getContext('2d'),
            pr = window.devicePixelRatio || 1,
            w = window.innerWidth,
            h = window.innerHeight,
            f = 90,
            q,
            m = Math,
            r = 0,
            u = m.PI * 2,
            v = m.cos,
            z = m.random
        c.width = w * pr
        c.height = h * pr
        x.scale(pr, pr)
        x.globalAlpha = 0.6

        function i() {
            x.clearRect(0, 0, w, h)
            q = [{
                x: 0,
                y: h * .7 + f
            }, {
                x: 0,
                y: h * .7 - f
            }]
            while (q[1].x < w + f) d(q[0], q[1])
        }

        function d(i, j) {
            x.beginPath()
            x.moveTo(i.x, i.y)
            x.lineTo(j.x, j.y)
            var k = j.x + (z() * 2 - 0.25) * f,
                n = y(j.y)
            x.lineTo(k, n)
            x.closePath()
            r -= u / -50
            x.fillStyle = '#' + (v(r) * 127 + 128 << 16 | v(r + u / 3) * 127 + 128 << 8 | v(r + u / 3 * 2) * 127 + 128).toString(16)
            x.fill()
            q[0] = q[1]
            q[1] = {
                x: k,
                y: n
            }
        }

        function y(p) {
            var t = p + (z() * 2 - 1.1) * f
            return (t > h || t < 0) ? y(p) : t
        }
        document.onclick = i
        document.ontouchstart = i
        i()
    </script>
